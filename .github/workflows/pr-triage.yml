name: pr triage

on:
  pull_request_target:
    types: [opened, edited, reopened, ready_for_review, synchronize]

permissions:
  contents: read

jobs:
  triage:
    name: label and validate PR
    runs-on: ubuntu-latest
    steps:
      - name: Check cairn-bot secrets
        env:
          CAIRN_BOT_CLIENT_ID: ${{ secrets.CAIRN_BOT_CLIENT_ID }}
          CAIRN_BOT_PRIVATE_KEY: ${{ secrets.CAIRN_BOT_PRIVATE_KEY }}
        run: |
          test -n "$CAIRN_BOT_CLIENT_ID" || { echo "::error::Missing CAIRN_BOT_CLIENT_ID repository Actions secret."; exit 1; }
          test -n "$CAIRN_BOT_PRIVATE_KEY" || { echo "::error::Missing CAIRN_BOT_PRIVATE_KEY repository Actions secret."; exit 1; }

      - name: Create cairn-bot token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.CAIRN_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CAIRN_BOT_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - name: Triage PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const issue_number = pr.number;

            const labels = {
              "status/0-draft": { color: "eeeeee", description: "Draft pull request" },
              "status/1-needs-review": { color: "fadecf", description: "Ready for review" },
              "size/S": { color: "0e8a16", description: "Small pull request" },
              "size/M": { color: "fbca04", description: "Medium pull request" },
              "size/L": { color: "d93f0b", description: "Large pull request" },
              "area/harness": { color: "bfdadc", description: "Harness engine changes" },
              "area/qa": { color: "c5def5", description: "QA app changes" },
              "area/docs": { color: "0075ca", description: "Documentation or specs" },
              "area/repo": { color: "fef2c0", description: "Repository automation or process" },
              "area/build": { color: "d4c5f9", description: "Build, package, or dependency changes" },
            };

            async function ensureLabel(name) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                const meta = labels[name];
                await github.rest.issues.createLabel({ owner, repo, name, ...meta });
              }
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const changed = files.reduce((sum, file) => sum + file.additions + file.deletions, 0);
            const size = changed <= 50 ? "size/S" : changed <= 250 ? "size/M" : "size/L";
            const status = pr.draft ? "status/0-draft" : "status/1-needs-review";
            const areaLabels = new Set();

            for (const file of files) {
              const path = file.filename;
              if (path.startsWith("packages/harness/")) areaLabels.add("area/harness");
              if (path.startsWith("packages/qa/")) areaLabels.add("area/qa");
              if (path.startsWith("docs/") || path.startsWith("spec/") || path === "README.md") areaLabels.add("area/docs");
              if (path.startsWith(".github/") || path === "AGENTS.md" || path === "CONTRIBUTING.md") areaLabels.add("area/repo");
              if (path === "package.json" || path === "package-lock.json" || path.startsWith("tsconfig")) areaLabels.add("area/build");
            }

            const desired = new Set([status, size, ...areaLabels]);
            for (const label of desired) await ensureLabel(label);

            const current = (pr.labels ?? []).map((label) => label.name);
            const managed = new Set(Object.keys(labels));
            for (const label of current) {
              if (managed.has(label) && !desired.has(label)) {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name: label }).catch((error) => {
                  if (error.status !== 404) throw error;
                });
              }
            }

            if (desired.size > 0) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [...desired] });
            }

            const body = pr.body ?? "";
            const linked = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?|refs?)\b[^\n]*(?:https:\/\/github\.com\/team-poem\/cairn\/issues\/\d+|team-poem\/cairn#\d+|#\d+)/i.test(body);
            if (!linked) {
              core.setFailed('PR body must link an issue with "Closes #N" or "Refs #N".');
            }
