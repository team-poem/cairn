name: close linked issues on develop

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: read

jobs:
  close-linked-issues:
    name: close issues linked from merged develop PRs
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'develop'
    runs-on: ubuntu-latest
    steps:
      - name: Check cairn-bot secrets
        env:
          CAIRN_BOT_CLIENT_ID: ${{ secrets.CAIRN_BOT_CLIENT_ID }}
          CAIRN_BOT_PRIVATE_KEY: ${{ secrets.CAIRN_BOT_PRIVATE_KEY }}
        run: |
          test -n "$CAIRN_BOT_CLIENT_ID" || { echo "::error::Missing CAIRN_BOT_CLIENT_ID repository Actions secret."; exit 1; }
          test -n "$CAIRN_BOT_PRIVATE_KEY" || { echo "::error::Missing CAIRN_BOT_PRIVATE_KEY repository Actions secret."; exit 1; }

      - name: Create cairn-bot token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.CAIRN_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CAIRN_BOT_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: read

      - name: Close linked issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const body = pr.body ?? "";
            const issueNumbers = new Set();
            const closingLine = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\b([^\n]*)/gi;
            let line;

            while ((line = closingLine.exec(body)) !== null) {
              const tail = line[1] ?? "";
              const refs = tail.matchAll(/(?:https:\/\/github\.com\/team-poem\/cairn\/issues\/|team-poem\/cairn#|#)(\d+)/g);
              for (const ref of refs) issueNumbers.add(Number(ref[1]));
            }

            if (issueNumbers.size === 0) {
              core.info("No closing issue references found.");
              return;
            }

            for (const issue_number of issueNumbers) {
              const issue = await github.rest.issues.get({ owner, repo, issue_number });
              if (issue.data.pull_request) {
                core.info(`Skipping #${issue_number}: it is a pull request, not an issue.`);
                continue;
              }

              await github.rest.issues.update({
                owner,
                repo,
                issue_number,
                state: "closed",
                state_reason: "completed",
              });
              core.info(`Closed #${issue_number} because PR #${pr.number} merged into develop.`);
            }
